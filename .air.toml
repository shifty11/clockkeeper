root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/clockkeeper ./cmd/"
  bin = "./tmp/clockkeeper"
  include_ext = ["go", "toml", "yaml", "yml"]
  exclude_dir = ["web", "tmp", "vendor", "node_modules", ".git", ".jj", ".claude"]
  exclude_regex = ["_test\\.go"]
  delay = 1000
  kill_delay = 500
  send_interrupt = true
  stop_on_error = true
