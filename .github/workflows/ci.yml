name: CI

on:
  workflow_call:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: clockkeeper
      DB_USER: postgres
      DB_PASSWORD: postgres

    steps:
      - uses: actions/checkout@v4

      - name: Debug Docker Hub secrets
        run: |
          echo "DOCKERHUB_USERNAME is set: ${{ secrets.DOCKERHUB_USERNAME != '' }}"
          echo "DOCKERHUB_TOKEN is set: ${{ secrets.DOCKERHUB_TOKEN != '' }}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name postgres \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=clockkeeper \
            -p 5432:5432 \
            --health-cmd pg_isready \
            --health-interval 10s \
            --health-timeout 5s \
            --health-retries 5 \
            postgres:18-alpine
          # Wait for postgres to be ready
          timeout=30
          while ! docker exec postgres pg_isready -U postgres -d clockkeeper 2>/dev/null; do
            timeout=$((timeout - 1))
            if [ $timeout -le 0 ]; then
              echo "PostgreSQL failed to become ready within 30 seconds"
              exit 1
            fi
            sleep 1
          done
          echo "PostgreSQL is ready"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.5.2 --activate

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Atlas
        uses: ariga/setup-atlas@v0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Go dependencies
        run: go mod download

      - name: Install frontend dependencies
        run: pnpm --dir web install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --dir web exec playwright install --with-deps

      - name: Generate protobuf code
        run: task gen:proto

      - name: Build frontend
        run: task frontend:build

      - name: Run migrations
        run: |
          task db:migrate
          task db:migrate:status

      - name: Run tests
        run: task test

      - name: Build binary
        run: task build

