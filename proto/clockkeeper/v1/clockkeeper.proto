syntax = "proto3";

package clockkeeper.v1;

option go_package = "github.com/rapha/clockkeeper/gen/clockkeeper/v1;clockkeeperv1";

service ClockKeeperService {
  rpc Login(LoginRequest) returns (LoginResponse) {}
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  string token = 1;
}
