syntax = "proto3";

package clockkeeper.v1;

option go_package = "github.com/loomi-labs/clockkeeper/gen/clockkeeper/v1;clockkeeperv1";

service ClockKeeperService {
  // Auth
  rpc LoginWithDiscord(LoginWithDiscordRequest) returns (LoginWithDiscordResponse) {}
  rpc CreateAnonymousSession(CreateAnonymousSessionRequest) returns (CreateAnonymousSessionResponse) {}
  rpc GetAuthConfig(GetAuthConfigRequest) returns (GetAuthConfigResponse) {}

  // Characters (read-only, from embedded data)
  rpc ListCharacters(ListCharactersRequest) returns (ListCharactersResponse) {}
  rpc GetCharacter(GetCharacterRequest) returns (GetCharacterResponse) {}

  // Editions (templates for creating scripts)
  rpc ListEditions(ListEditionsRequest) returns (ListEditionsResponse) {}

  // Scripts
  rpc ListScripts(ListScriptsRequest) returns (ListScriptsResponse) {}
  rpc GetScript(GetScriptRequest) returns (GetScriptResponse) {}
  rpc CreateScript(CreateScriptRequest) returns (CreateScriptResponse) {}
  rpc CreateScriptFromEdition(CreateScriptFromEditionRequest) returns (CreateScriptFromEditionResponse) {}
  rpc UpdateScript(UpdateScriptRequest) returns (UpdateScriptResponse) {}
  rpc DeleteScript(DeleteScriptRequest) returns (DeleteScriptResponse) {}
  rpc ImportScript(ImportScriptRequest) returns (ImportScriptResponse) {}

  // Games
  rpc ListGames(ListGamesRequest) returns (ListGamesResponse) {}
  rpc CreateGame(CreateGameRequest) returns (CreateGameResponse) {}
  rpc GetGame(GetGameRequest) returns (GetGameResponse) {}
  rpc RandomizeRoles(RandomizeRolesRequest) returns (RandomizeRolesResponse) {}
  rpc UpdateGameRoles(UpdateGameRolesRequest) returns (UpdateGameRolesResponse) {}
  rpc UpdateGameTravellers(UpdateGameTravellersRequest) returns (UpdateGameTravellersResponse) {}
  rpc UpdateGameExtraCharacters(UpdateGameExtraCharactersRequest) returns (UpdateGameExtraCharactersResponse) {}
  rpc UpdateTravellerAlignment(UpdateTravellerAlignmentRequest) returns (UpdateTravellerAlignmentResponse) {}
  rpc UpdateGameName(UpdateGameNameRequest) returns (UpdateGameNameResponse) {}
  rpc UpdatePlayerCount(UpdatePlayerCountRequest) returns (UpdatePlayerCountResponse) {}
  rpc UpdateGrimoireState(UpdateGrimoireStateRequest) returns (UpdateGrimoireStateResponse) {}
  rpc UpdateDemonBluffs(UpdateDemonBluffsRequest) returns (UpdateDemonBluffsResponse) {}
  rpc UpdateBagSubstitutions(UpdateBagSubstitutionsRequest) returns (UpdateBagSubstitutionsResponse) {}
  rpc GetSetupChecklist(GetSetupChecklistRequest) returns (GetSetupChecklistResponse) {}
  rpc GetDistribution(GetDistributionRequest) returns (GetDistributionResponse) {}
  rpc DeleteGame(DeleteGameRequest) returns (DeleteGameResponse) {}
  rpc DuplicateGame(DuplicateGameRequest) returns (DuplicateGameResponse) {}

  // Game lifecycle
  rpc StartGame(StartGameRequest) returns (StartGameResponse) {}
  rpc AdvancePhase(AdvancePhaseRequest) returns (AdvancePhaseResponse) {}
  rpc EndGame(EndGameRequest) returns (EndGameResponse) {}

  // Death tracking
  rpc RecordDeath(RecordDeathRequest) returns (RecordDeathResponse) {}
  rpc RemoveDeath(RemoveDeathRequest) returns (RemoveDeathResponse) {}
  rpc UseGhostVote(UseGhostVoteRequest) returns (UseGhostVoteResponse) {}

  // Night actions
  rpc ToggleNightAction(ToggleNightActionRequest) returns (ToggleNightActionResponse) {}

  // Character alignment
  rpc UpdateCharacterAlignment(UpdateCharacterAlignmentRequest) returns (UpdateCharacterAlignmentResponse) {}

  // Player presets
  rpc GetPlayerPresets(GetPlayerPresetsRequest) returns (GetPlayerPresetsResponse) {}
  rpc UpdatePlayerPresets(UpdatePlayerPresetsRequest) returns (UpdatePlayerPresetsResponse) {}
}

// --- Enums ---

enum GameState {
  GAME_STATE_UNSPECIFIED = 0;
  GAME_STATE_SETUP = 1;
  GAME_STATE_IN_PROGRESS = 2;
  GAME_STATE_COMPLETED = 3;
}

enum Team {
  TEAM_UNSPECIFIED = 0;
  TEAM_TOWNSFOLK = 1;
  TEAM_OUTSIDER = 2;
  TEAM_MINION = 3;
  TEAM_DEMON = 4;
  TEAM_TRAVELLER = 5;
  TEAM_FABLED = 6;
  TEAM_LORIC = 7;
}

enum TravellerAlignment {
  TRAVELLER_ALIGNMENT_UNSPECIFIED = 0;
  TRAVELLER_ALIGNMENT_GOOD = 1;
  TRAVELLER_ALIGNMENT_EVIL = 2;
}

enum PhaseType {
  PHASE_TYPE_UNSPECIFIED = 0;
  PHASE_TYPE_NIGHT = 1;
  PHASE_TYPE_DAY = 2;
}

// --- Auth ---

message LoginWithDiscordRequest {
  string code = 1;
  string redirect_uri = 2;
}

message LoginWithDiscordResponse {
  string token = 1;
  bool is_new_user = 2;
}

message CreateAnonymousSessionRequest {}

message CreateAnonymousSessionResponse {
  string token = 1;
}

message GetAuthConfigRequest {}

message GetAuthConfigResponse {
  string discord_client_id = 1;
  bool anonymous_enabled = 2;
}

// --- Characters ---

message Character {
  string id = 1;
  string name = 2;
  Team team = 3;
  string edition = 4;
  string ability = 5;
  bool setup = 6;
  repeated string reminders = 7;
  repeated string reminders_global = 8;
  string first_night_reminder = 9;
  string other_night_reminder = 10;
  int32 first_night = 11;
  int32 other_night = 12;
  string flavor = 13;
  repeated CharacterJinx jinxes = 14;
}

message CharacterJinx {
  string character_id = 1;
  string character_name = 2;
  string reason = 3;
}

message GetCharacterRequest {
  string id = 1;
}

message GetCharacterResponse {
  Character character = 1;
}

message ListCharactersRequest {
  string edition = 1;
  Team team = 2;
}

message ListCharactersResponse {
  repeated Character characters = 1;
}

// --- Editions ---

message Edition {
  string id = 1;
  string name = 2;
  repeated string character_ids = 3;
}

message ListEditionsRequest {}

message ListEditionsResponse {
  repeated Edition editions = 1;
}

// --- Scripts ---

message Script {
  int64 id = 1;
  string name = 2;
  string edition = 3;
  repeated string character_ids = 4;
  repeated Character characters = 5;
  bool is_system = 6;
}

message ListScriptsRequest {}

message ListScriptsResponse {
  repeated Script scripts = 1;
}

message GetScriptRequest {
  int64 id = 1;
}

message GetScriptResponse {
  Script script = 1;
}

message CreateScriptRequest {
  string name = 1;
  repeated string character_ids = 2;
}

message CreateScriptResponse {
  Script script = 1;
}

message CreateScriptFromEditionRequest {
  string edition_id = 1;
  string name = 2;
}

message CreateScriptFromEditionResponse {
  Script script = 1;
}

message UpdateScriptRequest {
  int64 id = 1;
  string name = 2;
  repeated string character_ids = 3;
}

message UpdateScriptResponse {
  Script script = 1;
}

message DeleteScriptRequest {
  int64 id = 1;
}

message DeleteScriptResponse {}

message ImportScriptRequest {
  string json = 1;
}

message ImportScriptResponse {
  Script script = 1;
}

// --- Games ---

message RoleDistribution {
  int32 townsfolk = 1;
  int32 outsiders = 2;
  int32 minions = 3;
  int32 demons = 4;
}

message ReminderToken {
  string character_id = 1;
  string character_name = 2;
  string text = 3;
}

message Position {
  float x = 1;
  float y = 2;
}

message BagSubstitution {
  string caused_by_id = 1;
  string caused_by_name = 2;
  string character_id = 3;
  string character_name = 4;
  string team = 5;
}

message Game {
  int64 id = 1;
  int64 script_id = 2;
  int32 player_count = 3;
  repeated string selected_role_ids = 4;
  GameState state = 5;
  RoleDistribution distribution = 6;
  repeated Character selected_characters = 7;
  repeated ReminderToken reminder_tokens = 8;
  int32 traveller_count = 9;
  repeated string selected_traveller_ids = 10;
  repeated Character selected_traveller_characters = 11;
  repeated string extra_character_ids = 12;
  repeated Character extra_character_details = 13;
  GamePlayState play_state = 14;
  map<string, TravellerAlignment> traveller_alignments = 15;
  string name = 16;
  map<string, Position> grimoire_positions = 17;
  map<string, string> grimoire_player_names = 18;
  map<string, string> grimoire_game_notes = 19;
  map<string, string> grimoire_round_notes = 20;
  repeated string selected_bluff_ids = 21;
  repeated Character selected_bluff_characters = 22;
  repeated BagSubstitution bag_substitutions = 23;
  map<string, string> grimoire_reminder_attachments = 24;
}

message CreateGameRequest {
  int64 script_id = 1;
  int32 player_count = 2;
  int32 traveller_count = 3;
}

message CreateGameResponse {
  Game game = 1;
}

message GetGameRequest {
  int64 id = 1;
}

message GetGameResponse {
  Game game = 1;
}

message RandomizeRolesRequest {
  int64 game_id = 1;
}

message RandomizeRolesResponse {
  Game game = 1;
}

message UpdateGameRolesRequest {
  int64 game_id = 1;
  repeated string selected_role_ids = 2;
}

message UpdateGameRolesResponse {
  Game game = 1;
}

message UpdateGameTravellersRequest {
  int64 game_id = 1;
  repeated string selected_traveller_ids = 2;
}

message UpdateGameTravellersResponse {
  Game game = 1;
}

message UpdateGameExtraCharactersRequest {
  int64 game_id = 1;
  repeated string extra_character_ids = 2;
}

message UpdateGameExtraCharactersResponse {
  Game game = 1;
}

// --- Setup Checklist ---

message SetupStep {
  string id = 1;
  string title = 2;
  string description = 3;
  bool requires_action = 4;
  repeated string character_ids = 5;
  repeated string editions = 6;
}

message GetSetupChecklistRequest {
  int64 game_id = 1;
}

message GetSetupChecklistResponse {
  repeated SetupStep steps = 1;
}

// --- Distribution ---

message GetDistributionRequest {
  int32 player_count = 1;
}

message GetDistributionResponse {
  RoleDistribution distribution = 1;
}

// --- Phases & Deaths ---

message Phase {
  int64 id = 1;
  int32 round_number = 2;
  PhaseType type = 3;
  bool is_active = 4;
  repeated Death deaths = 5;
  repeated string completed_actions = 6;
  map<string, string> character_alignments = 7;
}

message Death {
  int64 id = 1;
  string role_id = 2;
  int64 phase_id = 3;
  bool ghost_vote = 4;
}

message GamePlayState {
  int32 current_round = 1;
  Phase current_phase = 2;
  repeated Phase phases = 3;
  repeated Death all_deaths = 4;
}

// --- Game Lifecycle ---

message StartGameRequest {
  int64 game_id = 1;
}

message StartGameResponse {
  Game game = 1;
}

message AdvancePhaseRequest {
  int64 game_id = 1;
}

message AdvancePhaseResponse {
  Game game = 1;
}

message EndGameRequest {
  int64 game_id = 1;
}

message EndGameResponse {
  Game game = 1;
}

// --- Death Tracking ---

message RecordDeathRequest {
  int64 game_id = 1;
  string role_id = 2;
  optional int64 phase_id = 3;
  bool propagate = 4;
}

message RecordDeathResponse {
  Game game = 1;
}

message RemoveDeathRequest {
  int64 game_id = 1;
  int64 death_id = 2;
  bool propagate = 3;
}

message RemoveDeathResponse {
  Game game = 1;
}

message UseGhostVoteRequest {
  int64 game_id = 1;
  int64 death_id = 2;
}

message UseGhostVoteResponse {
  Game game = 1;
}

// --- Game List ---

message GameSummary {
  int64 id = 1;
  string script_name = 2;
  int32 player_count = 3;
  GameState state = 4;
  int32 current_round = 5;
  PhaseType current_phase_type = 6;
  int32 death_count = 7;
  int32 traveller_count = 8;
  string name = 9;
}

message ListGamesRequest {}

message ListGamesResponse {
  repeated GameSummary games = 1;
}

message DeleteGameRequest {
  int64 id = 1;
}

message DeleteGameResponse {}

message DuplicateGameRequest {
  int64 game_id = 1;
}

message DuplicateGameResponse {
  Game game = 1;
}

// --- Traveller Alignment ---

message UpdateTravellerAlignmentRequest {
  int64 game_id = 1;
  string role_id = 2;
  TravellerAlignment alignment = 3;
}

message UpdateTravellerAlignmentResponse {
  Game game = 1;
}

// --- Game Name ---

message UpdateGameNameRequest {
  int64 game_id = 1;
  string name = 2;
}

message UpdateGameNameResponse {
  Game game = 1;
}

message UpdatePlayerCountRequest {
  int64 game_id = 1;
  int32 player_count = 2;
}

message UpdatePlayerCountResponse {
  Game game = 1;
}

// --- Grimoire State ---

message UpdateGrimoireStateRequest {
  int64 game_id = 1;
  map<string, Position> positions = 2;
  map<string, string> player_names = 3;
  map<string, string> game_notes = 4;
  map<string, string> round_notes = 5;
  map<string, string> reminder_attachments = 6;
}

message UpdateGrimoireStateResponse {
  Game game = 1;
}

// --- Demon Bluffs ---

message UpdateDemonBluffsRequest {
  int64 game_id = 1;
  repeated string bluff_ids = 2;
}

message UpdateDemonBluffsResponse {
  Game game = 1;
}

// --- Bag Substitutions ---

message UpdateBagSubstitutionsRequest {
  int64 game_id = 1;
  repeated BagSubstitution bag_substitutions = 2;
}

message UpdateBagSubstitutionsResponse {
  Game game = 1;
}

// --- Night Actions ---

message ToggleNightActionRequest {
  int64 game_id = 1;
  string action_id = 2;
  bool done = 3;
  int64 phase_id = 4;
}

message ToggleNightActionResponse {
  Game game = 1;
}

// --- Character Alignment ---

message UpdateCharacterAlignmentRequest {
  int64 game_id = 1;
  int64 phase_id = 2;
  string role_id = 3;
  string alignment = 4; // "good", "evil", or "" to clear
  bool propagate = 5;
}

message UpdateCharacterAlignmentResponse {
  Game game = 1;
}

// --- Player Presets ---

message GetPlayerPresetsRequest {}

message GetPlayerPresetsResponse {
  repeated string names = 1;
}

message UpdatePlayerPresetsRequest {
  repeated string names = 1;
}

message UpdatePlayerPresetsResponse {
  repeated string names = 1;
}
